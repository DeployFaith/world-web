name: WorldWeb Build Validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  worldweb-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all registered sites
        run: npm run site:build-all

      - name: Export all registered sites
        run: npm run site:export-all

      - name: Validate World Web outputs
        run: npm run site:validate

      - name: JavaScript syntax checks
        run: npm run site:check-js

      - name: Check generated outputs are up to date (PR only)
        if: github.event_name == 'pull_request'
        run: |
          npm run site:check-generated || (
            echo "Generated WorldWeb outputs are stale. Run site build/export locally and commit the updated files.";
            git status --short -- registry.json sites;
            git diff -- registry.json sites;
            exit 1
          )

      - name: Upload static site bundle (push to main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: worldweb-static-bundle
          path: |
            registry.json
            sites/**
          if-no-files-found: error
